<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>GymBro Pro</title>
    <style>
        :root {
            --accent-color: #FFDE4D;
            --bg-color: #000000;
            --card-bg: #1C1C1E;
            --card-bg-secondary: #2C2C2E;
            --text-color: #FFFFFF;
            --text-secondary: #8E8E93;
            --border-color: #2C2C2E;
        }
        
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0; padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            height: 100vh; width: 100vw;
        }

        /* HLAVNÍ ROZCESTNÍK (DOMOVSKÁ OBRAZOVKA) */
        .home-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            height: 100vh; width: 100vw;
            gap: 12px;
            padding: calc(env(safe-area-inset-top) + 12px) 12px calc(env(safe-area-inset-bottom) + 12px) 12px;
        }

        .menu-tile {
            background: var(--card-bg);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: transform 0.1s;
            text-align: center;
            padding: 20px;
        }
        .menu-tile:active { transform: scale(0.95); }
        .menu-tile span { font-size: 32px; margin-bottom: 8px; }

        /* FULLSCREEN MODULY (STRÁNKY) */
        .page {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--bg-color);
            z-index: 100;
            display: flex;
            flex-direction: column;
            padding: calc(env(safe-area-inset-top) + 16px) 16px calc(env(safe-area-inset-bottom) + 16px) 16px;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.1, 0.76, 0.55, 0.94);
        }
        .page.active { transform: translateY(0); }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .page-title { font-size: 24px; font-weight: 700; }
        .back-btn {
            background: var(--card-bg);
            color: var(--accent-color);
            border: none; padding: 8px 16px;
            border-radius: 12px; font-weight: 600; font-size: 14px;
        }

        .page-content {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* LOGIN SCREEN */
        #login-screen {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--bg-color);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 32px;
        }

        /* PRVKY FORMULÁŘŮ DLE iOS DESIGNU */
        .ios-input, .ios-select {
            width: 100%;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
        }
        .ios-btn {
            background: var(--accent-color);
            color: #000; font-weight: 600;
            padding: 16px; border-radius: 12px;
            border: none; font-size: 16px;
            text-align: center; width: 100%;
            cursor: pointer;
        }
        .ios-btn-sub {
            background: var(--card-bg-secondary);
            color: var(--text-color);
        }

        .ios-card {
            background: var(--card-bg);
            border-radius: 14px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: var(--card-bg-secondary);
            border-radius: 8px;
            font-size: 14px;
        }

        /* LIVE STOPY - KRUH */
        .live-circle {
            width: 150px; height: 150px; border-radius: 50%;
            background: var(--accent-color); color: #000;
            font-size: 24px; font-weight: 700;
            display: flex; justify-content: center; align-items: center;
            margin: 30px auto; border: none;
            box-shadow: 0 0 20px rgba(255,222,77,0.3);
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="font-size: 34px; font-weight: 800; margin-bottom: 8px;">GymBro</h1>
        <p style="color: var(--text-secondary); margin-bottom: 24px;">Zadej kód tréninkové skupiny</p>
        <input type="password" id="pin-input" class="ios-input" placeholder="••••" maxlength="4" style="max-width: 200px; text-align: center; font-size: 24px; margin-bottom: 24px;">
        <button onclick="overitPin()" class="ios-btn" style="max-width: 200px;">Vstoupit</button>
    </div>

    <div id="app-interface" class="home-grid hidden">
        <div class="menu-tile" onclick="openPage('page-stats')"><span>📊</span>Statistiky</div>
        <div class="menu-tile" onclick="openPage('page-profile')"><span>⚙️</span>Nastavení</div>
        <div class="menu-tile" onclick="openPage('page-week')"><span>📅</span>Historie</div>
        <div class="menu-tile" onclick="openPage('page-live')" style="border-color: var(--accent-color);"><span>🏋️‍♂️</span>Cvičení</div>
    </div>

    <div id="page-stats" class="page">
        <div class="page-header">
            <h1 class="page-title">Statistiky</h1>
            <button class="back-btn" onclick="closePage('page-stats')">Zavřít</button>
        </div>
        <div class="page-content">
            <div class="ios-card">
                <span style="color: var(--text-secondary); font-size: 13px;">Odcvičeno tréninků celkem</span>
                <span style="font-size: 28px; font-weight: 800;" id="stat-count-workouts">0</span>
            </div>
            <div class="ios-card">
                <span style="color: var(--text-secondary); font-size: 13px;">Celkový strávený čas</span>
                <span style="font-size: 28px; font-weight: 800;" id="stat-total-time">0m</span>
            </div>
            <div class="ios-card">
                <span style="color: var(--text-secondary); font-size: 13px;">Celkem odjetých sérií</span>
                <span style="font-size: 28px; font-weight: 800;" id="stat-total-sets">0</span>
            </div>
        </div>
    </div>

    <div id="page-profile" class="page">
        <div class="page-header">
            <h1 class="page-title">Nastavení</h1>
            <button class="back-btn" onclick="closePage('page-profile')">Zavřít</button>
        </div>
        <div class="page-content">
            <div class="ios-card">
                <span style="font-size: 14px; color: var(--text-secondary);">Přihlášen jako: <strong style="color:#fff" id="user-display-name">...</strong></span>
            </div>
            
            <div class="ios-card">
                <h3 style="font-size: 15px; margin-bottom: 8px;">Moje Cviky</h3>
                <div style="display: flex; gap: 8px; margin-bottom: 10px;">
                    <input type="text" id="new-cvik-name" class="ios-input" placeholder="Nový cvik..." style="padding: 10px;">
                    <button class="ios-btn" style="width: auto; padding: 10px 20px;" onclick="pridatItemDoDatabaze('cvik')">+</button>
                </div>
                <div id="settings-cviky-list" style="display:flex; flex-direction:column; gap:4px; max-height:120px; overflow-y:auto;"></div>
            </div>

            <div class="ios-card">
                <h3 style="font-size: 15px; margin-bottom: 8px;">Moje Posilovny</h3>
                <div style="display: flex; gap: 8px; margin-bottom: 10px;">
                    <input type="text" id="new-gym-name" class="ios-input" placeholder="Nová gym..." style="padding: 10px;">
                    <button class="ios-btn" style="width: auto; padding: 10px 20px;" onclick="pridatItemDoDatabaze('posilovna')">+</button>
                </div>
                <div id="settings-gyms-list" style="display:flex; flex-direction:column; gap:4px; max-height:120px; overflow-y:auto;"></div>
            </div>

            <button class="ios-btn" onclick="syncSGoogleSheets()">🔄 Synchronizovat cloud</button>
            <button class="ios-btn ios-btn-sub" onclick="exportDoCSV()">📤 Exportovat zálohu (.csv)</button>
        </div>
    </div>

    <div id="page-week" class="page">
        <div class="page-header">
            <h1 class="page-title">Historie tréninků</h1>
            <button class="back-btn" onclick="closePage('page-week')">Zavřít</button>
        </div>
        <div class="page-content" id="history-container">
            </div>
    </div>

    <div id="page-live" class="page">
        <div class="page-header">
            <h1 class="page-title" id="live-screen-title">Nový Trénink</h1>
            <button class="back-btn" onclick="zavritWorkoutOkno()">Zavřít</button>
        </div>
        <div class="page-content">
            
            <div id="live-setup-zone" style="display:flex; flex-direction:column; gap:12px;">
                <div>
                    <label style="font-size:12px; color:var(--text-secondary); display:block; margin-bottom:4px;">Dnešní Datum</label>
                    <input type="text" id="live-date-input" class="ios-input" readonly>
                </div>
                <div>
                    <label style="font-size:12px; color:var(--text-secondary); display:block; margin-bottom:4px;">Zvol typ / zaměření</label>
                    <input type="text" id="live-workout-name" class="ios-input" placeholder="např. PUSH, LEGDAY, KARDIO">
                </div>
                <div>
                    <label style="font-size:12px; color:var(--text-secondary); display:block; margin-bottom:4px;">Vyber posilovnu ze seznamu</label>
                    <select id="live-gym-select" class="ios-select"></select>
                </div>
                <button class="ios-btn" style="margin-top:12px;" onclick="startSession()">SPUSTIT TRÉNINK</button>
            </div>

            <div id="live-active-zone" class="hidden" style="display:flex; flex-direction:column; flex:1; justify-content:space-between;">
                <div style="text-align: center;">
                    <div id="active-timer" style="font-size: 40px; font-weight: 800; margin-bottom: 5px;">00:00:00</div>
                    <div id="active-meta-label" style="font-size: 14px; color: var(--text-secondary);">PUSH @ Můj Gym</div>
                </div>

                <div class="ios-card" style="margin: 15px 0;">
                    <label style="font-size:11px; color:var(--text-secondary)">Aktuálně cvičený cvik:</label>
                    <select id="active-exercise-select" class="ios-select" style="margin-bottom:8px;"></select>
                    
                    <div style="display:flex; gap:8px;">
                        <input type="number" id="active-reps" class="ios-input" placeholder="Opakování (např. 10)" style="padding:12px;">
                        <button class="ios-btn" style="width:auto; padding:0 20px;" onclick="ulozitSeriiDoZaznamu()">+ Uložit sérii</button>
                    </div>
                    <div id="logged-series-live" style="font-size:12px; color:var(--accent-color); margin-top:6px; min-height:16px;"></div>
                </div>

                <button id="live-action-trigger" class="live-circle" onclick="toggleSeriePauza()">START</button>
                <button class="ios-btn" style="background: #FF453A; color: #fff;" onclick="ukoncitAUlozitSession()">UKONČIT A ZAPSAT TRÉNINK</button>
            </div>

        </div>
    </div>

    <script>
        const API_URL = "SEM_VLOŽ_SVOU_URL_Z_GOOGLE_APPS_SCRIPTU";

        let uzivatel = "";
        let dbCviky = ["Benchpress", "Dřep", "Mrtvý tah", "Shyby", "Bicepsový zdvih"];
        let dbPosilovny = ["Form Factory", "GymIn", "Domácí gym"];
        let localWorkouts = JSON.parse(localStorage.getItem("gymbro_v3_data")) || [];
        
        let activeWorkout = null;
        let timerInterval = null;
        let totalSeconds = 0;
        let currentStatus = "ready"; // ready, serie, rest
        let temporarySeriesCount = 0;

        // OVLÁDÁNÍ FULLSCREEN STRÁNEK
        function openPage(id) {
            if(id === 'page-live' && !activeWorkout) {
                document.getElementById("live-date-input").value = new Date().toLocaleDateString('cs-CZ');
            }
            document.getElementById(id).classList.add("active");
        }
        function closePage(id) { document.getElementById(id).classList.remove("active"); }

        // LOGIN
        async function overitPin() {
            const pin = document.getElementById("pin-input").value;
            if(!pin) return;
            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify({ akce: "prihlaseni", kod: pin })
                });
                const res = await response.json();
                if(res.status === "success") {
                    uzivatel = res.uzivatel;
                    initApp();
                } else { alert("Neplatný kód!"); }
            } catch(e) {
                if(pin === "4821") { uzivatel = "Jan Novák (Offline)"; initApp(); } 
                else { alert("Chyba sítě. Zadej 4821 pro offline nouzový režim."); }
            }
        }

        function initApp() {
            document.getElementById("user-display-name").innerText = uzivatel;
            document.getElementById("login-screen").classList.add("hidden");
            document.getElementById("app-interface").classList.remove("hidden");
            buildMenus();
            vypocitejStatistiky();
            renderujHistorii();
        }

        // NAPLNĚNÍ MENU A SEZNAMŮ Z DATABÁZE
        function buildMenus() {
            const gymSel = document.getElementById("live-gym-select");
            const cvikSel = document.getElementById("active-exercise-select");
            const setCvikList = document.getElementById("settings-cviky-list");
            const setGymList = document.getElementById("settings-gyms-list");

            gymSel.innerHTML = ""; cvikSel.innerHTML = ""; setCvikList.innerHTML = ""; setGymList.innerHTML = "";

            dbPosilovny.forEach(g => gymSel.innerHTML += `<option value="${g}">${g}</option>`);
            dbCviky.forEach(c => cvikSel.innerHTML += `<option value="${c}">${c}</option>`);
            
            dbCviky.forEach(c => setCvikList.innerHTML += `<div class="list-item"><span>${c}</span></div>`);
            dbPosilovny.forEach(g => setGymList.innerHTML += `<div class="list-item"><span>${g}</span></div>`);
        }

        function pridatItemDoDatabaze(typ) {
            if(typ === 'cvik') {
                const val = document.getElementById("new-cvik-name").value;
                if(val) { dbCviky.push(val); document.getElementById("new-cvik-name").value = ""; }
            } else {
                const val = document.getElementById("new-gym-name").value;
                if(val) { dbPosilovny.push(val); document.getElementById("new-gym-name").value = ""; }
            }
            buildMenus();
        }

        // WORKOUT LOGIKA
        function startSession() {
            const jmeno = document.getElementById("live-workout-name").value || "TRÉNINK";
            const gym = document.getElementById("live-gym-select").value;

            activeWorkout = {
                id: "w_" + Date.now(),
                datum: document.getElementById("live-date-input").value,
                casStartu: new Date().toLocaleTimeString('cs-CZ'),
                posilovna: gym,
                typTreninku: jmeno,
                celkovyCas: "00:00:00",
                celkemSerii: 0
            };

            document.getElementById("active-meta-label").innerText = `${activeWorkout.typTreninku} @ ${activeWorkout.posilovna}`;
            document.getElementById("live-setup-zone").classList.add("hidden");
            document.getElementById("live-active-zone").classList.remove("hidden");
            document.getElementById("live-screen-title").innerText = "Trénink běží";

            totalSeconds = 0;
            temporarySeriesCount = 0;
            document.getElementById("logged-series-live").innerText = "Zatím žádné série.";
            
            timerInterval = setInterval(() => {
                totalSeconds++;
                let h = Math.floor(totalSeconds / 3600).toString().padStart(2, '0');
                let m = Math.floor((totalSeconds % 3600) / 60).toString().padStart(2, '0');
                let s = (totalSeconds % 60).toString().padStart(2, '0');
                document.getElementById("live-timer").innerText = `${h}:${m}:${s}`;
            }, 1000);
        }

        function toggleSeriePauza() {
            const btn = document.getElementById("live-action-trigger");
            if(currentStatus === "ready" || currentStatus === "rest") {
                currentStatus = "serie"; btn.innerText = "PAUZA"; btn.style.background = "#FF453A";
            } else {
                currentStatus = "rest"; btn.innerText = "SÉRIE"; btn.style.background = "var(--accent-color)";
            }
        }

        function ulozitSeriiDoZaznamu() {
            const reps = document.getElementById("active-reps").value || "10";
            temporarySeriesCount++;
            activeWorkout.celkemSerii++;
            document.getElementById("logged-series-live").innerText = `Zapsáno celkem: ${temporarySeriesCount} sérií u tohoto cviku.`;
        }

        function ukoncitAUlozitSession() {
            clearInterval(timerInterval);
            if(activeWorkout) {
                activeWorkout.celkovyCas = document.getElementById("live-timer").innerText;
                localWorkouts.push(activeWorkout);
                localStorage.setItem("gymbro_v3_data", JSON.stringify(localWorkouts));
            }
            activeWorkout = null;
            document.getElementById("live-active-zone").classList.add("hidden");
            document.getElementById("live-setup-zone").classList.remove("hidden");
            document.getElementById("live-screen-title").innerText = "Nový Trénink";
            
            vypocitejStatistiky();
            renderujHistorii();
            closePage('page-live');
            alert("Trénink úspěšně uložen!");
        }

        function zavritWorkoutOkno() {
            if(activeWorkout) {
                if(!confirm("Máš rozdělaný trénink, opravdu ho chceš zahodit?")) return;
                clearInterval(timerInterval);
                activeWorkout = null;
                document.getElementById("live-active-zone").classList.add("hidden");
                document.getElementById("live-setup-zone").classList.remove("hidden");
                document.getElementById("live-screen-title").innerText = "Nový Trénink";
            }
            closePage('page-live');
        }

        // HISTORIE A ŽIVÉ STATISTIKY
        function renderujHistorii() {
            const container = document.getElementById("history-container");
            container.innerHTML = "";
            if(localWorkouts.length === 0) {
                container.innerHTML = "<p style='color:var(--text-secondary); text-align:center;'>Žádné uložené tréninky.</p>";
                return;
            }
            localWorkouts.slice().reverse().forEach(w => {
                container.innerHTML += `
                    <div class="ios-card">
                        <div style="display:flex; justify-content:between; align-items:center; width:100%">
                            <strong style="font-size:16px; flex:1;">${w.typTreninku}</strong>
                            <span style="font-size:12px; color:var(--accent-color); background:var(--card-bg-secondary); padding:4px 8px; border-radius:6px;">${w.celkovyCas}</span>
                        </div>
                        <div style="font-size:13px; color:var(--text-secondary); margin-top:4px;">
                            ${w.datum} • ${w.posilovna} • Sérií: ${w.celkemSerii || 0}
                        </div>
                    </div>
                `;
            });
        }

        function vypocitejStatistiky() {
            document.getElementById("stat-count-workouts").innerText = localWorkouts.length;
            
            let totalSets = 0;
            let totalMins = 0;
            
            localWorkouts.forEach(w => {
                totalSets += (w.celkemSerii || 0);
                if(w.celkovyCas) {
                    const parts = w.celkovyCas.split(":");
                    if(parts.length === 3) {
                        totalMins += Math.floor((parseInt(parts[0]) * 60) + parseInt(parts[1]));
                    }
                }
            });

            document.getElementById("stat-total-sets").innerText = totalSets;
            document.getElementById("stat-total-time").innerText = totalMins + "m";
        }

        function exportDoCSV() {
            let csv = "ID;Datum;Typ;Posilovna;Trvani;Serii\n";
            localWorkouts.forEach(w => csv += `${w.id};${w.datum};${w.typTreninku};${w.posilovna};${w.celkovyCas};${w.celkemSerii || 0}\n`);
            let blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            let a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "gymbro_backup.csv";
            a.click();
        }

        async function syncSGoogleSheets() {
            try {
                const r = await fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify({ akce: "synchronizace_treninku", uzivatel: uzivatel, treninky: localWorkouts })
                });
                const res = await r.json();
                if(res.status === "success") alert("Synchronizováno s Google Sheets!");
            } catch(e) { alert("Chyba přenosu. Data zůstávají v iPhonu."); }
        }
    </script>
</body>
</html>
